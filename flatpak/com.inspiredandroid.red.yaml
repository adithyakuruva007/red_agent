app-id: com.inspiredandroid.red
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: red-wrapper

finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --persist=.red
  - --persist=.java

modules:
  - name: red
    buildsystem: simple
    build-commands:
      # Extract and install the application
      - tar xf Red-linux-x86_64.tar.gz
      - mkdir -p /app/lib/red
      - cp -r Red/* /app/lib/red/

      # Install wrapper script
      - install -Dm755 red-wrapper.sh /app/bin/red-wrapper

      # Install desktop file
      - install -Dm644 com.inspiredandroid.red.desktop /app/share/applications/com.inspiredandroid.red.desktop

      # Install metainfo
      - install -Dm644 com.inspiredandroid.red.metainfo.xml /app/share/metainfo/com.inspiredandroid.red.metainfo.xml

      # Install icons
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/com.inspiredandroid.red.png

    sources:
      - type: file
        path: ../composeApp/build/compose/binaries/main/app/Red-linux-x86_64.tar.gz
        dest-filename: Red-linux-x86_64.tar.gz

      - type: file
        path: com.inspiredandroid.red.desktop

      - type: file
        path: com.inspiredandroid.red.metainfo.xml

      - type: file
        path: ../composeApp/icon.png

      - type: script
        dest-filename: red-wrapper.sh
        commands:
          - export PATH="/app/lib/red/bin:${PATH}"
          - export LD_LIBRARY_PATH="/app/lib/red/lib/runtime/lib:${LD_LIBRARY_PATH}"
          - exec /app/lib/red/bin/Red "$@"
